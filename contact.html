<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Smart Market Price Board</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f2027;
  --text:white;
  --card:rgba(255,255,255,0.08);
  --accent1:#00f5d4;
  --accent2:#f15bb5;
}

body.light{
  --bg:#f4f6f9;
  --text:#111;
  --card:rgba(0,0,0,0.05);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
  overflow-x:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

nav{
  position:fixed;
  width:100%;
  padding:15px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  z-index:1000;
}

nav ul{
  display:flex;
  list-style:none;
}

nav ul li{
  margin-left:25px;
}

nav a{
  text-decoration:none;
  color:var(--text);
}

nav a:hover{
  color:var(--accent1);
}

.toggle{
  cursor:pointer;
  padding:5px 12px;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  border-radius:20px;
}

section{
  padding:140px 10%;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.contact-box{
  background:var(--card);
  padding:40px;
  border-radius:25px;
  backdrop-filter:blur(15px);
  width:100%;
  max-width:600px;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.form-group{
  position:relative;
  margin-bottom:25px;
}

.form-group input,
.form-group textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:var(--text);
}

.form-group label{
  position:absolute;
  left:12px;
  top:12px;
  font-size:0.9rem;
  pointer-events:none;
  transition:0.3s;
  opacity:0.7;
}

.form-group input:focus + label,
.form-group input:valid + label,
.form-group textarea:focus + label,
.form-group textarea:valid + label{
  top:-10px;
  font-size:0.75rem;
  color:var(--accent1);
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  color:white;
  font-size:1rem;
  cursor:pointer;
  transition:0.4s;
}

button:hover{
  transform:scale(1.05);
}

.success-message{
  text-align:center;
  margin-top:15px;
  color:lightgreen;
  display:none;
}

footer{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<nav>
  <h3>Smart Price Board</h3>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="components.html">Components</a></li>
    <li><a href="team.html">Team</a></li>
    <li><a href="papers.html">Paper Review</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><span class="toggle" onclick="toggleMode()">🌙</span></li>
  </ul>
</nav>

<section>

<div class="contact-box">
<h1>Contact Us</h1>

<form name="contact" method="POST" data-netlify="true" onsubmit="return validateForm()">
<input type="hidden" name="form-name" value="contact">

<div class="form-group">
<input type="text" name="name" id="name" required>
<label for="name">Full Name</label>
</div>

<div class="form-group">
<input type="email" name="email" id="email" required>
<label for="email">Email Address</label>
</div>

<div class="form-group">
<textarea name="message" id="message" rows="4" required></textarea>
<label for="message">Your Message</label>
</div>

<button type="submit">Send Message</button>
<div class="success-message" id="successMsg">
Message sent successfully!
</div>

</form>
</div>

</section>

<footer>
© 2026 Smart Market Price Board Research Project | IUB
</footer>

<script>
function toggleMode(){
  document.body.classList.toggle("light");
}

function validateForm(){
  const name=document.getElementById("name").value.trim();
  const email=document.getElementById("email").value.trim();
  const message=document.getElementById("message").value.trim();

  if(name==="" || email==="" || message===""){
    alert("Please fill all fields.");
    return false;
  }

  document.getElementById("successMsg").style.display="block";
  return true;
}

/* Particle Background */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*3,
    speedX:(Math.random()-0.5),
    speedY:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.speedX;
    p.y+=p.speedY;
    ctx.fillStyle="#00f5d4";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>
<audio id="typingSound" src="typing.mov"></audio>

<script src="script.js"></script>
</body>

</html>
